[build]
command = "rustup default stable && brew install go-task/tap/go-task cargo-lambda/tap/cargo-lambda && task setup && task build"
publish = "site/dist"

[dev]
framework = "#static"

[build.processing.html]
pretty_urls = true

[[headers]]
for = "/playground/*"
[headers.values]
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
