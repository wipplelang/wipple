version: "3"

run: once

tasks:
  compiler:
    cmds:
      - cargo run -- {{.CLI_ARGS}}
  test:
    cmds:
      - node {{.CLI_ARGS}} test
  test:update:
    cmds:
      - task test -- --test-update-snapshots
  install:
    cmds:
      - cargo install --path=compiler/cli

  setup:
    deps:
      - setup:api
      - setup:playground
      - setup:site
  setup:api:
    dir: compiler/api
    cmds:
      - npm install
  setup:playground:
    dir: playground
    cmds:
      - npm install
  setup:site:
    dir: site
    cmds:
      - npm install

  serve:site:
    dir: site
    cmds:
      - npm run dev -- --open
  serve:playground:
    deps:
      - build:api
      - build:library
    dir: playground
    cmds:
      - npm run dev -- --open
  serve:compiler-docs:
    dir: compiler-docs
    cmds:
      - mdbook serve

  build:
    deps:
      - build:library
      - build:playground
      - build:compiler-docs
    dir: site
    cmds:
      - rm -rf dist
      - npm run build
      - cp -r ../library/dist/. dist/library
      - cp -r ../playground/build/. dist/playground
      - cp -r ../compiler-docs/book/. dist/compiler-docs
  build:library:
    dir: library
    cmds:
      - node build.js
  build:playground:
    deps:
      - build:api
      - build:library
    dir: playground
    cmds:
      - npm run build
  build:api:
    dir: compiler/api
    cmds:
      - npm run build
  build:compiler-docs:
    dir: compiler-docs
    cmds:
      - mdbook build

  vscode:
    dir: vscode
    deps:
      - build:api
      - build:library
    cmds:
      - npm run extension
