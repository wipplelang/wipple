name: Tests
on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v6
              with:
                  node-version: 24

            - uses: go-task/setup-task@v1

            - uses: actions/cache@v5
              with:
                  path: "compiler/.build"
                  key: ${{ runner.os }}-spm-test-${{ hashFiles('compiler/Package.resolved') }}
                  restore-keys: |
                      ${{ runner.os }}-spm-test-

            - run: task test
